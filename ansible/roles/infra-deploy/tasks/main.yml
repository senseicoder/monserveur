---
# --- Docker install ---

- name: Vérifier si Docker est déjà installé
  command: docker --version
  register: docker_check
  changed_when: false
  failed_when: false

- name: Installer Docker (ignoré si déjà présent)
  when: docker_check.rc != 0
  block:
    - name: Installer les prérequis Docker
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true

    - name: Créer /etc/apt/keyrings
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Télécharger la clé GPG Docker
      get_url:
        url: https://download.docker.com/linux/debian/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"
        force: false

    - name: Ajouter le dépôt Docker
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian {{ ansible_distribution_release }} stable"
        state: present
        filename: docker

    - name: Installer Docker engine et plugin Compose
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: true

# --- Kernel IPv6 ---

- name: Activer le forwarding IPv6
  sysctl:
    name: "{{ item }}"
    value: "1"
    state: present
    sysctl_file: /etc/sysctl.d/99-docker-ipv6.conf
    reload: true
  loop:
    - net.ipv6.conf.all.forwarding
    - net.ipv6.conf.default.forwarding

# --- Docker daemon (IPv6 + ip6tables) ---

- name: Déployer la configuration du daemon Docker
  template:
    src: docker-daemon.json.j2
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: "0644"
  register: docker_daemon

# --- Vérification état réseau mindwtr avant toute intervention ---

- name: Inspecter le réseau Docker mindwtr
  command: docker network inspect mindwtr
  register: mindwtr_net_inspect
  failed_when: false
  changed_when: false

- name: Détecter si le réseau mindwtr a IPv6 activé
  set_fact:
    mindwtr_net_ipv6: >-
      {{ ((mindwtr_net_inspect.stdout | from_json)[0].EnableIPv6)
         if mindwtr_net_inspect.rc == 0
         else false }}

# --- Reconfiguration Docker si daemon.json ou réseau a changé ---
# Ordre : arrêt stack → redémarrage Docker → suppression réseau → recréation

- name: Arrêter la stack mindwtr (avant reconfiguration)
  command: docker-compose -f {{ deploy_dir }}/docker-compose.{{ item }}.yml down
  args:
    chdir: "{{ deploy_dir }}"
  loop:
    - traefik
    - mindwtr
  when: docker_daemon is changed or not mindwtr_net_ipv6
  ignore_errors: true

- name: Redémarrer Docker si daemon.json modifié
  systemd:
    name: docker
    state: restarted
  when: docker_daemon is changed

- name: Supprimer le réseau mindwtr si IPv6 absent (sera recréé avec IPv6)
  command: docker network rm mindwtr
  when: not mindwtr_net_ipv6
  register: net_rm
  failed_when: net_rm.rc != 0 and 'No such network' not in net_rm.stderr
  ignore_errors: "{{ ansible_check_mode }}"

- name: Démarrer et activer Docker
  systemd:
    name: docker
    state: started
    enabled: true

# --- Réseau Docker ---

- name: Créer le réseau Docker mindwtr (IPv6)
  command: docker network create --ipv6 --subnet fd00:0:0:1::/64 mindwtr
  register: network_result
  failed_when: network_result.rc != 0 and 'already exists' not in network_result.stderr
  changed_when: network_result.rc == 0

# --- Répertoires ---

- name: Créer les répertoires de déploiement
  file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0750"
  loop:
    - "{{ deploy_dir }}"
    - "{{ deploy_dir }}/traefik-dynamic"
    - "{{ deploy_dir }}/certs"

- name: Créer le répertoire data/cloud (uid 1000 — user interne mindwtr-cloud)
  file:
    path: "{{ deploy_dir }}/data/cloud"
    state: directory
    owner: 1000
    group: 1000
    mode: "0750"

# --- Fichiers Compose ---

- name: Déployer docker-compose.traefik.yml
  template:
    src: docker-compose.traefik.yml.j2
    dest: "{{ deploy_dir }}/docker-compose.traefik.yml"
    owner: root
    group: root
    mode: "0640"
  notify: restart traefik

- name: Déployer docker-compose.mindwtr.yml
  template:
    src: docker-compose.mindwtr.yml.j2
    dest: "{{ deploy_dir }}/docker-compose.mindwtr.yml"
    owner: root
    group: root
    mode: "0640"
  diff: false
  notify: restart mindwtr

- name: Déployer la configuration TLS dynamique Traefik
  template:
    src: traefik-tls.yml.j2
    dest: "{{ deploy_dir }}/traefik-dynamic/tls.yml"
    owner: root
    group: root
    mode: "0640"
  notify: restart traefik

# --- Vhost Apache pour le challenge certbot ---
# Sans vhost dédié, Apache utilise bots.plcoder.net par défaut et redirige vers HTTPS,
# ce qui casse la validation HTTP-01 de Let's Encrypt.

- name: Déployer le vhost Apache pour {{ mindwtr_domain }}
  template:
    src: apache-mindwtr.conf.j2
    dest: /etc/apache2/sites-available/{{ mindwtr_domain }}.conf
    owner: root
    group: root
    mode: "0644"
  register: apache_vhost

- name: Activer le vhost Apache pour {{ mindwtr_domain }}
  command: a2ensite {{ mindwtr_domain }}
  register: apache_a2ensite
  changed_when: "'Enabling site' in apache_a2ensite.stdout"
  failed_when: apache_a2ensite.rc != 0

- name: Recharger Apache si vhost modifié
  service:
    name: apache2
    state: reloaded
  when: apache_vhost is changed or apache_a2ensite is changed

# --- Certificat TLS ---
# certbot est installé via snap sur glaurung (pas apt).
# --webroot : le vhost mindwtr.daneel.net sert /.well-known/ sans redirection.

- name: Obtenir le certificat TLS pour {{ mindwtr_domain }}
  command: >
    certbot certonly --webroot
    -w /var/www/html
    --non-interactive
    --agree-tos
    --email {{ acme_email }}
    -d {{ mindwtr_domain }}
  args:
    creates: /etc/letsencrypt/live/{{ mindwtr_domain }}/fullchain.pem

- name: Copier les certs mindwtr dans deploy_dir/certs (isolation Traefik)
  copy:
    src: "{{ item.src }}"
    dest: "{{ deploy_dir }}/certs/{{ item.dest }}"
    remote_src: true
    owner: root
    group: root
    mode: "0640"
  loop:
    - src: /etc/letsencrypt/live/{{ mindwtr_domain }}/fullchain.pem
      dest: fullchain.pem
    - src: /etc/letsencrypt/live/{{ mindwtr_domain }}/privkey.pem
      dest: privkey.pem
  ignore_errors: "{{ ansible_check_mode }}"

- name: Installer le hook de renouvellement certbot
  template:
    src: certbot-renewal-hook.sh.j2
    dest: /etc/letsencrypt/renewal-hooks/deploy/reload-traefik.sh
    owner: root
    group: root
    mode: "0755"

# --- Démarrage des services ---

- name: Démarrer Traefik
  command: docker-compose -f {{ deploy_dir }}/docker-compose.traefik.yml up -d
  args:
    chdir: "{{ deploy_dir }}"
  changed_when: false
  ignore_errors: "{{ ansible_check_mode }}"

- name: Démarrer mindwtr-cloud
  command: docker-compose -f {{ deploy_dir }}/docker-compose.mindwtr.yml up -d
  args:
    chdir: "{{ deploy_dir }}"
  changed_when: false
  ignore_errors: "{{ ansible_check_mode }}"
