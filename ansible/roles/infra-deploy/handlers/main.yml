---
- name: reload apache
  service:
    name: apache2
    state: reloaded

- name: restart traefik
  command: docker compose -f {{ deploy_dir }}/docker-compose.traefik.yml restart
  args:
    chdir: "{{ deploy_dir }}"
  ignore_errors: "{{ ansible_check_mode }}"

- name: restart mindwtr
  command: docker compose -f {{ deploy_dir }}/docker-compose.mindwtr.yml restart
  args:
    chdir: "{{ deploy_dir }}"
  ignore_errors: "{{ ansible_check_mode }}"
