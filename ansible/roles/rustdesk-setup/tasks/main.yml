---
- name: Créer le répertoire de déploiement rustdesk
  file:
    path: "{{ deploy_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Créer le répertoire data (clé id_ed25519 persistée)
  file:
    path: "{{ deploy_dir }}/data"
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Déployer docker-compose.rustdesk.yml
  template:
    src: docker-compose.rustdesk.yml.j2
    dest: "{{ deploy_dir }}/docker-compose.rustdesk.yml"
    owner: root
    group: root
    mode: "0640"
  register: rustdesk_compose

- name: Démarrer hbbs + hbbr
  command: docker-compose -f {{ deploy_dir }}/docker-compose.rustdesk.yml up -d
  args:
    chdir: "{{ deploy_dir }}"
  changed_when: false
  ignore_errors: "{{ ansible_check_mode }}"

- name: Redémarrer la stack si le compose a changé
  command: docker-compose -f {{ deploy_dir }}/docker-compose.rustdesk.yml up -d --force-recreate
  args:
    chdir: "{{ deploy_dir }}"
  when: rustdesk_compose is changed and not ansible_check_mode
  changed_when: true
