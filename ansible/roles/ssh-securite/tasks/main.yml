---
- name: Durcir sshd_config — désactiver l'authentification par mot de passe
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?\s*PasswordAuthentication\s+'
    line: "PasswordAuthentication {{ ssh_password_authentication }}"
    validate: "/usr/sbin/sshd -t -f %s"
  become: true
  notify: restart sshd

- name: Durcir sshd_config — interdire le login root direct
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?\s*PermitRootLogin\s+'
    line: "PermitRootLogin {{ ssh_permit_root_login }}"
    validate: "/usr/sbin/sshd -t -f %s"
  become: true
  notify: restart sshd

- name: Durcir sshd_config — restreindre les comptes autorisés
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?\s*AllowUsers\s+'
    line: "AllowUsers {{ ssh_allow_users | join(' ') }}"
    validate: "/usr/sbin/sshd -t -f %s"
  become: true
  notify: restart sshd
